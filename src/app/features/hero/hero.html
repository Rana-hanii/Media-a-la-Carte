<section #heroSection class="hero-section relative pt-28 pb-16 md:pt-36 md:pb-32">
  <!-- clipPath: CSS path() cannot use % — use SVG 0–1 coords + url(#…) -->
  <svg class="hero-clip-defs" width="0" height="0" aria-hidden="true" focusable="false">
    <defs>
      <clipPath id="heroImageClip" clipPathUnits="objectBoundingBox">
        <path
          d="M 0 0.28
             Q 0 0.06 0.14 0.02
             L 0.2 0
             Q 0.24 0 0.28 0
             L 1 0
             L 1 0.72
             Q 1 0.76 0.97 0.79
             L 0.8 0.98
             Q 0.77 1 0.73 1
             L 0 1
             L 0 0.28 Z"
        />
      </clipPath>
    </defs>
  </svg>

  <div class="hero-content section-container">

    <!-- Headline -->
    <div class="text-center max-w-3xl mx-auto mb-10 md:mb-16">
      <p class="hero-tag text-xs md:text-sm tracking-[0.2em] uppercase text-text-muted mb-6 font-medium">
        #1 Media Marketplace for Advertisers &amp; Agencies
      </p>
      <p class="hero-subtitle-top text-2xl md:text-3xl lg:text-4xl font-bold gradient-text mb-2">
        Bigger Impact
      </p>
      <h1 class="hero-title text-4xl md:text-5xl lg:text-[64px] font-bold text-white leading-[1.1] mb-4">
        Stronger Campaigns
      </h1>
      <p class="hero-subtitle-bottom text-xl md:text-2xl lg:text-3xl font-semibold text-text-secondary">
        Smarter Media Buying
      </p>
    </div>

    <!-- Image + buttons: CTAs sit in the chamfered corners -->
    <div class="hero-visual">
      <div class="hero-image">
        <div class="hero-image-media">
          <img 
            ngSrc="/images/hero.webp"
            alt="Business team celebrating success"
            class="w-3xl mx-auto hidden xl:block"
            width="896"
            height="520"
            priority
            fetchpriority="high"
          />
          <img 
          ngSrc="/images/hero-lg.webp"
          alt="Business team celebrating success"
          class="w-2xl mx-auto block xl:hidden rounded-3xl"
          width="1119"
          height="688"
          priority
          fetchpriority="high"
        />
          <div class="hero-image-fade" aria-hidden="true"></div>
        </div>

        <a
          href="#services"
          class="hero-cta hero-cta--primary translate-x-[-90px] translate-y-[-22px] lg:translate-x-[10px] lg:translate-y-[-40px]  xl:translate-x-[0] xl:translate-y-[0] btn-primary font-heading font-semibold rounded-full shadow-3xl! transition-all duration-300 hover:bg-brand-accent hover:text-black"
        >
          Start your Journey!
        </a>

        <a
          href="#features"
          class="hero-cta hero-cta--secondary translate-x-[70px] translate-y-[22px] lg:translate-x-[-10px] lg:translate-y-[40px]  xl:translate-x-[0] xl:translate-y-[0] btn-secondary font-heading font-semibold rounded-full  xl:backdrop-blur-md! transition-all duration-300  hover:bg-brand-accent! hover:text-black"
        >
        <img src="/images/icons/media.webp" alt="media" class="w-5 h-5">
          Learn More
        </a>
      </div>
    </div>
  </div>
</section>
