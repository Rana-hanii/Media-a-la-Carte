<section #ctaSection class="py-16 md:py-24">
  <div class="section-container">
    <div class="cta-card relative max-w-4xl mx-auto rounded-2xl overflow-hidden">

      <!-- Gradient border effect -->
      <div class="absolute inset-0 rounded-2xl bg-linear-to-br from-brand-pink/20 via-transparent to-brand-accent/20 p-px">
        <div class="w-full h-full rounded-2xl bg-surface-dark"></div>
      </div>

      <!-- Content -->
      <div class="relative z-10 px-8 py-12 md:px-16 md:py-16 text-center">
        <!-- Subtle background pattern -->
        <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(circle at 20% 50%, rgba(255,46,99,0.3), transparent 50%), radial-gradient(circle at 80% 50%, rgba(255,77,109,0.2), transparent 50%)"></div>

        <h2 class="relative text-2xl md:text-3xl lg:text-4xl font-bold text-white mb-8 leading-tight max-w-2xl mx-auto">
          Supercharge Your Media Strategy with Our 100% Efficiency
        </h2>

        <div class="relative flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-8 mb-10">
          <div class="flex items-center gap-3">
            <div class="w-6 h-6 rounded-full bg-linear-to-br from-brand-pink to-brand-accent flex items-center justify-center shrink-0">
             <img src="/images/icons/check.webp" alt="check" class="w-5 h-5">
            </div>
            <span class="text-white text-sm md:text-base font-medium">Plan, Book, and Manage Campaigns</span>
          </div>
          <div class="flex items-center gap-3">
            <div class="w-6 h-6 rounded-full bg-linear-to-br from-brand-pink to-brand-accent flex items-center justify-center shrink-0">
              <img src="/images/icons/check.webp" alt="check" class="w-5 h-5">
            </div>
            <span class="text-white text-sm md:text-base font-medium">Maximize Reach and ROI</span>
          </div>
        </div>

        <a  class="relative w-xs mx-auto flex items-center justify-center gap-2 bg-linear-to-r from-brand-pink to-brand-accent text-black font-semibold font-heading   py-4  rounded-xl">
          Optimize Your Media Today
         <img src="/images/icons/arrow-black.webp" alt="arrow-right" class="w-5 h-5">
        </a>
      </div>
    </div>
  </div>
</section>
